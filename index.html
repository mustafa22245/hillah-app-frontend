<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="appTitle">المساعد الأكاديمي</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
    --bg:#f1f5f9;
    --card:#fff;
    --primary:#4D95FF;
    --text:#222;
}

body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#fff;
}

body{
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* صفحات */
.page{display:none;padding:15px;}
.page.active{display:block}

/* كارد */
.card{
    background:var(--card);
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

/* ناف بار */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:var(--card);
    display:flex;
    justify-content:space-around;
    padding:10px;
}

/* Sidebar */
.sidebar{
    position:fixed;
    right:-100%;
    top:0;
    width:260px;
    height:100%;
    background:var(--card);
    transition:.3s;
    padding:20px;
}
.sidebar.active{right:0;}

.profile{
    text-align:center;
}
.profile img{
    width:80px;
    border-radius:50%;
}

/* Admin */
.admin{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#fff;
    display:none;
    padding:20px;
}
input,button{
    width:100%;
    padding:10px;
    margin:5px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <div onclick="toggleSide()">❌</div>

    <div class="profile">
        <img id="appLogo" src="https://i.ibb.co/VvzKXY7/bot-avatar.png">
        <h3 id="appName">المساعد الأكاديمي</h3>
    </div>

    <div class="card">⚙️ الإعدادات</div>
    <div class="card" onclick="toggleDark()">🌙 الوضع الليلي</div>
    <div class="card">🔔 الإشعارات</div>
    <div class="card">ℹ️ من نحن</div>
    <div class="card">🌐 اللغة</div>
    <div class="card">🚪 تسجيل خروج</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
    <h2 onclick="toggleSide()">☰ <span id="titleText">المساعد الأكاديمي</span></h2>
    <input placeholder="بحث..." oninput="search(this.value)">
    <div id="subjects"></div>
</div>

<!-- FAV -->
<div id="fav" class="page">
    <h2>⭐ المفضلة</h2>
    <div id="favList"></div>
</div>

<!-- RECENT -->
<div id="recent" class="page">
    <h2>🕒 المحفوظات</h2>
    <div id="recentList"></div>
</div>

<!-- SEARCH -->
<div id="more" class="page">
    <h2>🔍 نتائج البحث</h2>
    <div id="searchList"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="admin">
    <h2>لوحة التحكم</h2>

    <input id="subName" placeholder="اسم القسم">
    <button onclick="addSub()">إضافة قسم</button>

    <input id="fileName" placeholder="اسم الملف">
    <input id="fileUrl" placeholder="رابط الملف">
    <button onclick="addFile()">إضافة ملف</button>

    <input id="newTitle" placeholder="اسم التطبيق">
    <input id="newLogo" placeholder="رابط الصورة">
    <button onclick="updateApp()">تحديث الهوية</button>

    <button onclick="closeAdmin()">إغلاق</button>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="nav('home')">🏠</div>
    <div onclick="nav('fav')">⭐</div>
    <div onclick="nav('recent')">🕒</div>
    <div onclick="nav('more')">🔍</div>
</div>

<script>
let data = {subjects:[]}
let favs = JSON.parse(localStorage.getItem("favs"))||[]
let rec = JSON.parse(localStorage.getItem("rec"))||[]

/* عرض */
function render(){
    let box = document.getElementById("subjects")
    box.innerHTML=""

    data.subjects.forEach((s,i)=>{
        box.innerHTML += `<div class="card"><b>${s.name}</b></div>`

        s.files?.forEach(f=>{
            box.innerHTML += `
            <div class="card" onclick="openFile('${f.name}','${f.url}')">
                ${f.name}
                <span onclick="toggleFav('${f.url}',event)">⭐</span>
            </div>`
        })
    })
}

/* فتح ملف */
function openFile(name,url){
    rec.unshift({name,url})
    rec = rec.slice(0,10)
    localStorage.setItem("rec",JSON.stringify(rec))
    window.open(url)
}

/* مفضلة */
function toggleFav(url,e){
    e.stopPropagation()
    if(favs.includes(url)) favs = favs.filter(x=>x!=url)
    else favs.push(url)

    localStorage.setItem("favs",JSON.stringify(favs))
}

/* عرض المفضلة */
function showFav(){
    let box = document.getElementById("favList")
    box.innerHTML=""

    data.subjects.forEach(s=>{
        s.files?.forEach(f=>{
            if(favs.includes(f.url)){
                box.innerHTML += `<div class="card">${f.name}</div>`
            }
        })
    })
}

/* المحفوظات */
function showRecent(){
    let box = document.getElementById("recentList")
    box.innerHTML=""

    rec.forEach(r=>{
        box.innerHTML += `<div class="card">${r.name}</div>`
    })
}

/* البحث */
function search(q){
    nav("more")
    let box = document.getElementById("searchList")
    box.innerHTML=""

    data.subjects.forEach(s=>{
        s.files?.forEach(f=>{
            if(f.name.toLowerCase().includes(q.toLowerCase())){
                box.innerHTML += `<div class="card">${f.name}</div>`
            }
        })
    })
}

/* التنقل */
function nav(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
    document.getElementById(id).classList.add("active")

    if(id=="fav") showFav()
    if(id=="recent") showRecent()
}

/* sidebar */
function toggleSide(){
    document.getElementById("sidebar").classList.toggle("active")
}

/* dark */
function toggleDark(){
    document.body.classList.toggle("dark")
}

/* admin */
function addSub(){
    let n = document.getElementById("subName").value
    data.subjects.push({name:n,files:[]})
    render()
}

function addFile(){
    let n = document.getElementById("fileName").value
    let u = document.getElementById("fileUrl").value
    data.subjects[0].files.push({name:n,url:u})
    render()
}

function updateApp(){
    let t = document.getElementById("newTitle").value
    let l = document.getElementById("newLogo").value

    document.getElementById("titleText").innerText = t
    document.getElementById("appName").innerText = t
    document.getElementById("appLogo").src = l
}

function closeAdmin(){
    document.getElementById("admin").style.display="none"
}

/* دخول الأدمن */
let timer
document.body.addEventListener("mousedown",()=>{
    timer=setTimeout(()=>{
        let p=prompt("كلمة السر")
        if(p=="1234"){
            document.getElementById("admin").style.display="block"
        }
    },2000)
})
document.body.addEventListener("mouseup",()=>clearTimeout(timer))

render()
</script>

</body>
</html>
