<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الحلة الجامعي - النسخة السحابية</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0088cc">

    <style>
        :root { 
            --main-color: #0088cc; 
            --bg-color: #f8fafd; 
            --text-color: #333333;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; direction: rtl; transition: 0.4s; overflow-x: hidden; }
        .header { background: linear-gradient(135deg, var(--main-color), #005588); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        
        /* تصميم الشبكة */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 25px 15px; border-radius: 25px; text-align: center; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.05); font-weight: bold; border: 2px solid transparent; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .card:hover { border-color: var(--main-color); transform: translateY(-5px); }
        .card span:first-child { font-size: 30px; }

        /* لوحات العرض والتحكم */
        .panel { display: none; background: white; border-radius: 25px; padding: 20px; margin-top: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); animation: fadeIn 0.5s; }
        
        /* لوحة التحكم */
        .admin-panel { background: #1a1a2e; color: #efefef; border-top: 5px solid #e74c3c; }
        .admin-section { background: #16213e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #0f3460; }
        .admin-title { color: #48abe0; font-size: 16px; font-weight: bold; margin-bottom: 15px; display: block; border-right: 4px solid #e74c3c; padding-right: 10px; }
        .admin-input, .admin-select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #0f3460; box-sizing: border-box; background: #1a1a2e; color: white; }
        
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; background: var(--main-color); color: white; }
        .btn-close { background: #e74c3c; margin-bottom: 15px; }

        /* نافذة عرض الملفات المدمجة */
        .viewer-container { position: relative; width: 100%; height: 75vh; border-radius: 15px; overflow: hidden; background: #eee; }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="appTitle">تطبيق الحلة الجامعي</h2>
        <p id="appSubtitle">تحكم سحابي فوري ☁️</p>
    </div>

    <div class="container">
        <div id="loader" style="text-align:center; padding:50px;">🔒 جاري جلب البيانات...</div>

        <div id="mainGrid" class="grid" style="display:none;"></div>

        <div id="contentPanel" class="panel">
            <button class="action-btn btn-close" onclick="showMain()">🔙 العودة للقائمة</button>
            <h3 id="viewingTitle" style="text-align:center; margin-bottom:15px;"></h3>
            <div class="viewer-container">
                <iframe id="appViewer" src=""></iframe>
            </div>
        </div>

        <div id="adminPanel" class="panel admin-panel">
            <button class="action-btn btn-close" onclick="showMain()">❌ إغلاق الإعدادات</button>
            <div class="admin-section">
                <span class="admin-title">🎨 هوية التطبيق</span>
                <input type="text" id="editTitle" class="admin-input" placeholder="اسم التطبيق">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px;">
                    <label>لون التطبيق:</label>
                    <input type="color" id="colorMain" onchange="updateDesign()">
                </div>
            </div>

            <div class="admin-section">
                <span class="admin-title">➕ إضافة مادة جديدة</span>
                <select id="typeSelect" class="admin-select">
                    <option value="📄">ملزمة PDF</option>
                    <option value="🎥">فيديو تعليمي</option>
                    <option value="🔗">رابط خارجي</option>
                </select>
                <input type="text" id="itemName" class="admin-input" placeholder="اسم المادة">
                <input type="text" id="itemUrl" class="admin-input" placeholder="ضع الرابط هنا">
                <button class="action-btn" style="background:#2ecc71;" onclick="addNewItem()">💾 حفظ في السحابة</button>
            </div>
            <button class="action-btn" style="background:#f39c12; opacity:0.5;" onclick="deleteLast()">🗑️ حذف آخر عنصر</button>
        </div>

        <div style="text-align:center; padding:40px;">
            <button onclick="showAdmin()" style="background:none; border:none; color:gray; opacity:0.2; cursor:pointer;">[ لوحة التحكم ]</button>
        </div>
    </div>

    <script>
        // الرابط الخاص بك من الصورة
        const DB_URL = "https://hillah-app-default-rtdb.firebaseio.com/.json"; 

        let appData = { title: "تطبيق الحلة", mainColor: "#0088cc", items: [] };

        async function loadData() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                if (data) appData = data;
                applyData();
            } catch (e) { console.error("Error connecting to Firebase"); }
        }

        function applyData() {
            document.getElementById('appTitle').innerText = appData.title;
            document.documentElement.style.setProperty('--main-color', appData.mainColor);
            document.getElementById('loader').style.display = "none";
            document.getElementById('mainGrid').style.display = "grid";
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = "";
            (appData.items || []).forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showContent(index);
                card.innerHTML = `<span>${item.icon || '📂'}</span><span>${item.name}</span>`;
                grid.appendChild(card);
            });
        }

        async function saveToCloud() {
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(appData) });
            applyData();
        }

        function addNewItem() {
            const name = document.getElementById('itemName').value;
            const url = document.getElementById('itemUrl').value;
            const icon = document.getElementById('typeSelect').value;
            if(name && url) {
                if(!appData.items) appData.items = [];
                appData.items.push({ name, url, icon });
                saveToCloud();
                alert("تم الحفظ بنجاح!");
            }
        }

        function updateDesign() {
            appData.title = document.getElementById('editTitle').value || appData.title;
            appData.mainColor = document.getElementById('colorMain').value;
            saveToCloud();
        }

        function showContent(index) {
            const item = appData.items[index];
            document.getElementById('mainGrid').style.display = "none";
            document.getElementById('contentPanel').style.display = "block";
            document.getElementById('viewingTitle').innerText = item.name;
            document.getElementById('appViewer').src = item.url;
        }

        function showAdmin() {
            document.getElementById('mainGrid').style.display = "none";
            document.getElementById('adminPanel').style.display = "block";
            document.getElementById('editTitle').value = appData.title;
        }

        function showMain() {
            document.getElementById('mainGrid').style.display = "grid";
            document.getElementById('contentPanel').style.display = "none";
            document.getElementById('adminPanel').style.display = "none";
            document.getElementById('appViewer').src = ""; // إيقاف الفيديو عند العودة
        }

        function deleteLast() {
            if(confirm("حذف آخر مادة؟")) {
                appData.items.pop();
                saveToCloud();
            }
        }

        loadData();
    </script>
</body>
</html>
